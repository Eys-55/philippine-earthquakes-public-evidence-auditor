<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Progress Chart</title>
  <style>
    :root {
      color-scheme: dark;
      background: #0b0f17;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #0b0f17;
    }

    body {
      display: grid;
      place-items: start center;
      padding: 24px;
      box-sizing: border-box;
    }

    img {
      display: block;
      width: min(100%, 520px);
      height: auto;
    }
  </style>
</head>
<body>
  <img src="assets/building-code-progress-chart.svg" alt="">
</body>
</html>
